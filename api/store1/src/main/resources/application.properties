spring.application.name=store1



#spring.datasource.url=jdbc:mysql://localhost:3306/full-stack-ecommerce?serverTimezone=UTC
#spring.datasource.username=${DB_USERNAME_MYSQL}
#spring.datasource.password=${DB_PASSWORD_MYSQL}

# DOCKER
#spring.datasource.url=jdbc:mysql://localhost:3307/storedb
spring.datasource.username=storeuser
spring.datasource.password=storepass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Quando subir domínio, você só muda: app.frontend.url=https://seusite.com
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}


# Boot detects it automatically.
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Only remaining warning is open-in-view (not urgent). If you want to silence it later:
spring.jpa.open-in-view=false

spring.jpa.hibernate.ddl-auto=update

# ativar receber json no browser
spring.data.rest.base-path=/api

#Para visualizar as operaÃ§Ãµes SQL realizadas pelo JPA
spring.jpa.show-sql=true
spring.jpa.format-sql=true

# 1) Hibernate/JDBC: store timestamps normalized to UTC in DB
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 2) Hibernate default storage (helps avoid surprises with newer Hibernate)
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# 3) JSON serialization timezone (so your API returns dates in Brazil time by default)
spring.jackson.time-zone=America/Sao_Paulo

# Optional: set JVM timezone (useful if you create "now()" without specifying zone)
# (Safer to not rely on JVM default, but this is fine for dev)
user.timezone=UTC

jwt.secret=${JWT_SECRET}

jwt.expiration-minutes=14400
# 24h => 60*24 = 1440 min
# 10 dias => 60*24*10 = 1440 min

# Add to application.properties

# Content Negotiation
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.ignore-accept-header=false

# JSON Serialization
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Logging for debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.mrcl.store1=DEBUG




