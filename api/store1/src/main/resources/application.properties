spring.application.name=store1



spring.application.name=store1

spring.datasource.url=jdbc:h2:mem:storedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.data.rest.base-path=/api

jwt.secret=${JWT_SECRET:dev_secret_dev_secret_dev_secret_1234}
jwt.expiration-minutes=14400

app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}


