# ===============================
# ? DATABASE (H2 FILE MODE)
# ===============================
# H2 database stored on disk (NOT memory)
# This creates a folder "data/" with the database inside
#spring.datasource.url=jdbc:h2:file:./data/storedb
# server H2   http://localhost:8080/h2-console
# spring.datasource.url=jdbc:h2:tcp://localhost:9092/./data/storedb

spring.datasource.url=jdbc:h2:file:./data/storedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false

# H2 driver
#spring.datasource.driverClassName=org.h2.Driver

# Default credentials (safe for learning)
#spring.datasource.username=sa
#spring.datasource.password=

# ===============================
# ? JPA / HIBERNATE
# ===============================
# Tells Hibernate which SQL dialect to use
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically creates/updates tables based on entities
#spring.jpa.hibernate.ddl-auto=update

# ===============================
# ? H2 CONSOLE (OPTIONAL)
# ===============================
# Enable browser access to database
#spring.h2.console.enabled=true

# Access URL: http://localhost:8080/h2-console
spring.h2.console.path=/h2-console

# ===============================
# ? SERVER
# ===============================
# Application port
#server.port=8080
# render
server.port=${PORT:8080}


# ===============================
# ? JWT CONFIG (IMPORTANT)
# ===============================
# Uses environment variable JWT_SECRET if exists
# Otherwise uses default value (fallback)
jwt.secret=${JWT_SECRET:dev_secret_dev_secret_dev_secret_1234}
